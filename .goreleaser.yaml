version: 2

env:
  - GITHUB_TOKEN={{ if index .Env "GITHUB_TOKEN" }}{{ .Env.GITHUB_TOKEN }}{{else}}''{{end}}

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: shipyard
    ldflags:
      - -s -w
      - -X github.com/shipyard/shipyard-cli/version.GitCommit={{.ShortCommit}}
      - -X github.com/shipyard/shipyard-cli/version.Version={{.Version}}
archives:
  - formats:
      - binary
    name_template: "shipyard-{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: 'checksums.txt'
changelog:
  disable: true
release:
  prerelease: auto
brews:
  - name: shipyard
    repository:
      owner: shipyard
      name: homebrew-tap
      branch: main

    commit_author:
      name: shipyard
      email: hello@shipyard.build

    commit_msg_template: "Formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula

    skip_upload: "{{ if .Prerelease }}true{{ else }}false{{ end }}"

    homepage: "https://shipyard.build"
    description: "A tool to manage Ephemeral Environments on the Shipyard platform"
    license: "Apache-2.0"

    install: |
      bin.install "shipyard"
