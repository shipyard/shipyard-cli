name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.24.x'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Build snapshot
        run: goreleaser release --snapshot --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: test-and-build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
          - os: macos-latest
            platform: darwin_arm64
          - os: macos-latest
            platform: darwin_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run smoke tests
        run: |
          BINARY=$(find dist -path "*${{ matrix.platform }}*" -name "shipyard" -type f | head -1)
          if [[ -z "$BINARY" ]]; then
            echo "Binary for ${{ matrix.platform }} not found in dist/"
            find dist -type f
            exit 1
          fi
          chmod +x "$BINARY"
          ./scripts/smoke-test.sh "$BINARY"

  release:
    name: Release
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.24.x'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
